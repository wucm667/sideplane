name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  binaries:
    name: Build release binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        run: npm ci
        working-directory: web

      - name: Build web assets for embed
        run: npm run build
        working-directory: web

      - name: Build linux binaries
        shell: bash
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME}"
          commit="${GITHUB_SHA::12}"
          build_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          buildinfo_pkg="github.com/wucm667/sideplane/internal/buildinfo"
          ldflags="-X ${buildinfo_pkg}.Version=${version} -X ${buildinfo_pkg}.Commit=${commit} -X ${buildinfo_pkg}.BuildDate=${build_date}"

          mkdir -p dist
          for arch in amd64 arm64; do
            GOOS=linux GOARCH="${arch}" CGO_ENABLED=0 go build -trimpath -ldflags "${ldflags}" -o "dist/sideplane-server_linux_${arch}" ./cmd/sideplane-server
            GOOS=linux GOARCH="${arch}" CGO_ENABLED=0 go build -trimpath -ldflags "${ldflags}" -o "dist/sideplane-sidecar_linux_${arch}" ./cmd/sideplane-sidecar
            GOOS=linux GOARCH="${arch}" CGO_ENABLED=0 go build -trimpath -ldflags "${ldflags}" -o "dist/sideplane_linux_${arch}" ./cmd/sideplane
          done

          (
            cd dist
            for file in sideplane*; do
              sha256sum "${file}"
            done > SHA256SUMS
          )

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --verify-tag \
            --title "${GITHUB_REF_NAME}" \
            --notes "Sideplane ${GITHUB_REF_NAME}"
