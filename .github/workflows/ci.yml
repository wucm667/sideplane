name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  go:
    name: Go build and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate OpenAPI
        run: make openapi-check
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install web dependencies
        run: npm ci
        working-directory: web
      - name: Build web assets for embed
        run: npm run build
        working-directory: web
      - name: Check install script syntax
        run: sh -n install.sh
      - name: Build server with embedded web assets
        run: go build ./cmd/sideplane-server
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...
      - name: Read-only smoke test
        run: scripts/smoke-readonly.sh
      - name: Race test
        run: go test -race ./...

  web:
    name: Web typecheck and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build
